name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: windows-pip-${{ hashFiles('requirements-cross-platform.txt') }}
          restore-keys: |
            windows-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements-cross-platform.txt

      - name: OCR smoke test
        run: python dev_tools/ocr_windows_test.py --backend onnx --langs azur_lane

      - name: Build with PyInstaller
        run: |
          pyinstaller --name Alas --windowed --add-data "assets;assets" --add-data "bin/cnocr_models;bin/cnocr_models" --hidden-import onnxruntime alas.py

      - name: Package
        run: 7z a AlasApp_Windows.7z ./dist/Alas

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlasApp_Windows
          path: AlasApp_Windows.7z

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: AlasApp_Windows.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
